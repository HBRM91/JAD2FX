    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                50:  'var(--navy-50)',
                100: 'var(--navy-100)',
                200: 'var(--navy-200)',
                300: 'var(--navy-300)',
                400: 'var(--navy-400)',
                500: 'var(--navy-500)',
                600: 'var(--navy-600)',
                700: 'var(--navy-700)',

                950: 'var(--navy-950)',
              },
              gold: {

                400: '#E5C158',
                500: '#D4AF37',
                600: '#B5952F',
                700: '#8A7024',
                800: '#5E4D18',
                900: '#33290D',
              }
            },
            fontFamily: {
              sans: ['Inter', 'Cairo', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],

            }
          }

    <style>
      /* ── Deep Navy Terminal — dark mode only ──────────────────── */
      :root {
        /* Calibrated for WCAG AA compliance on dark backgrounds      */
        /* Text uses slate-* (hardcoded); navy-* is for bg & borders  */
        --navy-50:  #ECF3FA;
        --navy-100: #C9DDEF;
        --navy-200: #91B8D8;
        --navy-300: #62A0CC;   /* accent text: ~8:1 on 950           */
        --navy-400: #5090C0;   /* secondary labels: ~6:1 on 900      */
        --navy-500: #4E7EAC;   /* muted labels: ~4.6:1 on 900 ✓ AA  */
        --navy-600: #3A6490;   /* borders + large bold: ~3.5:1       */
        --navy-700: #1E3E5C;   /* card borders                       */
        --navy-800: #0E2336;   /* card backgrounds                   */
        --navy-900: #081628;   /* section backgrounds                 */
        --navy-950: #040C1C;   /* page background                    */
        color-scheme: dark;
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        background-color: var(--navy-950);
        color: #CBD5E1; /* slate-300 — always legible on dark bg */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: var(--navy-900); }
      ::-webkit-scrollbar-thumb { background: var(--navy-600); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--navy-500); }

      .tabular-nums { font-variant-numeric: tabular-nums; }

      /* Suppress layout transitions that cause flicker */
      svg *, canvas, .recharts-wrapper * { transition: none !important; }

      .view-enter { animation: fadeSlideIn 0.18s ease-out; }
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
