      /* ── Dark theme (default) ─────────────────────────── */
      :root {

      ::-webkit-scrollbar-thumb:hover { background: var(--navy-600); }
      .tabular-nums { font-variant-numeric: tabular-nums; }

      /* Smooth theme transition */
      *, *::before, *::after {
        transition: background-color 0.2s ease, border-color 0.15s ease;
      }
      /* Exclude transitions that shouldn't animate (charts, etc.) */
      svg *, canvas, .recharts-wrapper * { transition: none !important; }

      .view-enter { animation: fadeIn 0.15s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
