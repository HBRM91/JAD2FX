name = "jad2fx-yahoo-proxy"
main = "yahoo-proxy.js"
compatibility_date = "2024-01-01"

# ── KV namespace for market reports ──────────────────────────────────────────
[[kv_namespaces]]
binding = "REPORTS_KV"
id = "c105b1084a094471be4516496000fa1d"

# ── Scheduled cron ───────────────────────────────────────────────────────────
# 17:00 Casablanca (16:00 UTC) weekdays — BKAM publishes CoursVirement at 16:30 Casablanca.
# Running at 17:00 ensures data is available before capture.
# Morocco: UTC+1 year-round (UTC+0 during Ramadan, adjust manually if needed).
[triggers]
crons = ["0 16 * * 1-5"]

# ── Required secrets (wrangler secret put <NAME>) ────────────────────────────
# BKAM_FX_KEY      — BKAM FX API subscription key
# BKAM_MONIA_KEY   — BKAM MONIA subscription key (BDT yield curve)
# TAVILY_KEY       — Tavily search API key (market report web searches)
# ADMIN_PASSCODE   — Admin panel password (must match ADMIN_PASSCODE build var)
# GROQ_API_KEY     — Groq API key (LLM for reports + chat)
# GEMINI_API_KEY   — Gemini 2.5 Flash API key (LLM fallback)
# TWELVE_DATA_KEY  — Twelve Data API key (Yahoo Finance failover for 8 major pairs)
# RESEND_API_KEY   — Resend API key (contact form + report notification emails)
# CONTACT_EMAIL    — Lead destination email (e.g. contact@jad2advisory.com)
