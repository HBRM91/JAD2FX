name = "jad2fx-yahoo-proxy"
main = "yahoo-proxy.js"
compatibility_date = "2024-01-01"

# ── KV namespace for market reports ──────────────────────────────────────────
[[kv_namespaces]]
binding = "REPORTS_KV"
id = "c105b1084a094471be4516496000fa1d"

# ── Scheduled crons (disabled — free plan cron limit reached) ────────────────
# To enable auto market reports at 09h Casablanca:
#  1. Free up cron slots in Cloudflare dashboard (account is at free-plan limit of 5)
#  2. Uncomment the [triggers] block below and redeploy
#  3. Or upgrade to Workers Paid ($5/mo) for more cron slots
#
# Morocco time: UTC+1 year-round (UTC+0 during Ramadan).
#   08:00 UTC = 09:00 Casablanca → Market review (30 min into session)
#   07:30 UTC = 08:30 Casablanca → Market open notification
#
# [triggers]
# crons = ["0 8 * * 1-5", "30 7 * * 1-5"]

# ── Required secrets (wrangler secret put <NAME>) ────────────────────────────
# BKAM_FX_KEY      — BKAM FX API subscription key
# BKAM_MONIA_KEY   — BKAM MONIA subscription key (BDT yield curve)
# TAVILY_KEY       — Tavily search API key (market report web searches)
# ADMIN_PASSCODE   — Admin panel password (must match ADMIN_PASSCODE build var)
# GROQ_API_KEY     — Groq API key (LLM for reports + chat)
# GEMINI_API_KEY   — Gemini 2.5 Flash API key (LLM fallback)
