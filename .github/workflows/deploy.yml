name: Deploy JAD2FX

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Build & Deploy Next.js → Vercel ──────────────────────────────────────────
  deploy-vercel:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    # Only runs if VERCEL_TOKEN secret is present
    if: vars.DEPLOY_TARGET == 'vercel' || vars.DEPLOY_TARGET == ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

  # ── Deploy Cloudflare Worker (API proxy for LLM/BKAM) ────────────────────────
  deploy-worker:
    name: Deploy Worker (Cloudflare Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare
          command: deploy
          secrets: |
            BKAM_FX_KEY
            BKAM_MONIA_KEY
            GROQ_API_KEY
            GEMINI_API_KEY
            TAVILY_KEY
            ADMIN_PASSCODE
        env:
          BKAM_FX_KEY: ${{ secrets.BKAM_FX_KEY }}
          BKAM_MONIA_KEY: ${{ secrets.BKAM_MONIA_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          ADMIN_PASSCODE: ${{ secrets.ADMIN_PASSCODE }}
